<!DOCTYPE html>
<html>
<head>

<title>Your Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-image: url("bgg.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
font-family: Segoe UI;
}

.cart-box{
background:white;
padding:30px;
border-radius:20px;
margin:40px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

img{
height:120px;
}

</style>

</head>

<body>

<div class="container cart-box">

<h2>Your Cart 🛒</h2>

<div id="cartItems"></div>

<h4 id="total"></h4>

<br>

<a href="delivery.html" class="btn btn-success">Proceed to Checkout</a>

<br><br>

<a href="website.html" class="btn btn-secondary">Continue Shopping</a>

</div>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let output="";
let total=0;

cart.forEach(function(item,index){

/* qty missing ayithe 1 set chestundi */

let qty = item.qty || 1;

let subtotal = item.price * qty;

output +=
`<div class="row mb-4">

<div class="col-md-4">
<img src="${item.image}">
</div>

<div class="col-md-6">
<h5>${item.name}</h5>
<p>Price: ₹${item.price}</p>
<p>Quantity: ${qty}</p>
<p>Subtotal: ₹${subtotal}</p>
</div>

<div class="col-md-2">
<button class="btn btn-danger" onclick="removeItem(${index})">
Remove
</button>
</div>

</div>`;

total += subtotal;

});

document.getElementById("cartItems").innerHTML = output;

document.getElementById("total").innerHTML = "Total: ₹ " + total;


function removeItem(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

location.reload();

}

</script>

</body>
</html>
