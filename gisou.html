<!DOCTYPE html>
<html>
<head>

<title>Product Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fff0f5;
font-family:Segoe UI;
}

.container-box{
background:white;
padding:30px;
border-radius:20px;
margin:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.price{
color:#4b0b0bea;
font-size:22px;
font-weight:bold;
}

.btn-buy{
background:#4b0b0bea;
color:white;
border:none;
border-radius:25px;
padding:10px 30px;
cursor:pointer;
}

.img-fluid{
height:500px;
}

</style>
</head>

<body>

<div class="container">
<div class="row container-box align-items-center">

<div class="col-md-6 text-center">
<img src="images/GISOU🌸 (💗💘).jpg" class="img-fluid">
</div>

<div class="col-md-6">

<h2>GISOU BEAUTY</h2>

<p class="price">₹6999</p>

<p>
<pre>
<i><b>

•Gisou Honey Infused Hair Oil  
•Gisou Honey Infused Hair Mask  
•Gisou Honey Infused Conditioner  
•Gisou Honey Infused Hair Wash  
•Gisou Hair Perfume  

</b></i>
</pre>
</p>

<button class="btn-buy"
onclick="addToCart('GISOU Beauty Kit',6999,'images/GISOU🌸 (💗💘).jpg')">
Add to Cart 🛒
</button>

<br><br>

<a href="cart.html" class="btn btn-dark">Go to Cart</a>

<br><br>

<a href="website.html">⬅ Back to Shop</a>

</div>

</div>
</div>


<script>

function addToCart(name,price,image){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existingProduct = cart.find(item => item.name === name);

if(existingProduct){

existingProduct.qty += 1;

}else{

let product = {
name:name,
price:price,
image:image,
qty:1
};

cart.push(product);

}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Product Added To Cart 🛒");

}

</script>

</body>
</html>
