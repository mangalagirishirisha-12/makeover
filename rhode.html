<!DOCTYPE html>
<html>
<head>
<title>Rhode Beauty</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#fff0f5;
font-family:Segoe UI;
}

.container-box{
background:white;
padding:30px;
border-radius:20px;
margin:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.price{
color:#4b0b0b;
font-size:22px;
font-weight:bold;
}

.btn-buy{
background:#4b0b0b;
color:white;
border:none;
border-radius:25px;
padding:10px 30px;
cursor:pointer;
}

img{
block-size:450px;
}

</style>
</head>

<body>

<div class="container">
<div class="row container-box align-items-center">

<div class="col-md-6 text-center">
<img src="images/download.jpg">
</div>

<div class="col-md-6">

<h2>Rhode Beauty Kit</h2>

<p class="price">₹7999</p>

<p>Premium Rhode skincare set with glazing fluid, lip treatment and blush.</p>

<button class="btn-buy"
onclick="addToCart('Rhode Beauty Kit',7999,'images/download.jpg')">
Add to Cart 🛒
</button>

<br><br>

<a href="cart.html" class="btn btn-dark">Go To Cart</a>

<br><br>

<a href="website.html">⬅ Back to Shop</a>

</div>

</div>
</div>

<script>

function addToCart(name,price,image){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* check if already exists */

let existing = cart.find(item => item.name === name);

if(existing){

existing.qty += 1;

}else{

let product = {
name:name,
price:price,
image:image,
qty:1
};

cart.push(product);

}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Product Added To Cart 🛒");

}

</script>

</body>
</html>
